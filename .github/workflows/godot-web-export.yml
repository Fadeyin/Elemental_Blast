name: Godot Web Export

on:
  push:
    branches:
      - main
      - cursor/godot-web-9125
  pull_request:
    branches:
      - main

env:
  GODOT_VERSION: 4.6
  EXPORT_NAME: elemental-blast

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Setup Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          
      - name: Setup Export Preset
        run: |
          mkdir -p build/web
          
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          
          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/web/index.html"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false
          
          [preset.0.options]
          
          custom_template/debug=""
          custom_template/release=""
          variant/extensions_support=false
          variant/thread_support=false
          vram_texture_compression/for_desktop=true
          vram_texture_compression/for_mobile=true
          html/export_icon=true
          html/custom_html_shell=""
          html/head_include=""
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/experimental_virtual_keyboard=false
          progressive_web_app/enabled=false
          progressive_web_app/ensure_cross_origin_isolation_headers=false
          progressive_web_app/offline_page=""
          progressive_web_app/display=1
          progressive_web_app/orientation=2
          progressive_web_app/icon_144x144=""
          progressive_web_app/icon_180x180=""
          progressive_web_app/icon_512x512=""
          progressive_web_app/background_color=Color(0, 0, 0, 1)
          EOF
      
      - name: Build Web Version
        run: |
          ./Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --export-release "Web" build/web/index.html
      
      - name: Verify Build Output
        run: |
          echo "=== Build contents ==="
          ls -lah build/web/
          echo ""
          echo "=== File sizes ==="
          du -sh build/web/*
      
      - name: Create Index with Mobile Optimization
        run: |
          cat > build/web/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ru">
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
              <meta name="mobile-web-app-capable" content="yes">
              <meta name="apple-mobile-web-app-capable" content="yes">
              <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
              <title>Elemental Blast</title>
              <style>
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }
                  
                  html, body {
                      width: 100%;
                      height: 100%;
                      overflow: hidden;
                      background-color: #1a1e28;
                      touch-action: none;
                      -webkit-touch-callout: none;
                      -webkit-user-select: none;
                      user-select: none;
                  }
                  
                  #canvas {
                      display: block;
                      margin: 0;
                      color: white;
                      width: 100%;
                      height: 100%;
                  }
                  
                  #canvas:focus {
                      outline: none;
                  }
                  
                  .loader {
                      position: absolute;
                      top: 50%;
                      left: 50%;
                      transform: translate(-50%, -50%);
                      text-align: center;
                      color: white;
                      font-family: Arial, sans-serif;
                  }
                  
                  .spinner {
                      border: 4px solid rgba(255, 255, 255, 0.1);
                      border-top: 4px solid white;
                      border-radius: 50%;
                      width: 50px;
                      height: 50px;
                      animation: spin 1s linear infinite;
                      margin: 0 auto 20px;
                  }
                  
                  @keyframes spin {
                      0% { transform: rotate(0deg); }
                      100% { transform: rotate(360deg); }
                  }
              </style>
          </head>
          <body>
              <canvas id="canvas">
                  HTML5 canvas appears to be unsupported in the current browser.<br>
                  Please try updating or use a different browser.
              </canvas>
              
              <div class="loader" id="loader">
                  <div class="spinner"></div>
                  <div>Загрузка игры...</div>
              </div>
              
              <script src="index.js"></script>
              <script>
                  const GODOT_CONFIG = {
                      "args": [],
                      "canvasResizePolicy": 2,
                      "executable": "index",
                      "experimentalVK": false,
                      "focusCanvas": true,
                      "gdextensionLibs": []
                  };
                  
                  const engine = new Engine(GODOT_CONFIG);
                  
                  engine.init().then(() => {
                      return engine.startGame();
                  }).then(() => {
                      document.getElementById('loader').style.display = 'none';
                  }).catch((err) => {
                      console.error('Error starting game:', err);
                      document.getElementById('loader').innerHTML = '<div style="color: #ff6b6b;">Ошибка загрузки игры</div>';
                  });
              </script>
          </body>
          </html>
          EOF
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 14
      
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/cursor/godot-web-9125'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
          cname: false
      
      - name: Deploy to Netlify
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/cursor/godot-web-9125'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './build/web'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
