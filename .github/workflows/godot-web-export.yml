name: Godot Web Export

on:
  push:
    branches:
      - main
      - cursor/godot-web-9125
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_to_pages:
        description: 'Деплоить на GitHub Pages?'
        required: false
        type: boolean
        default: false
      deploy_to_netlify:
        description: 'Деплоить на Netlify?'
        required: false
        type: boolean
        default: false

env:
  GODOT_VERSION: 4.6
  EXPORT_NAME: elemental-blast

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Setup Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          
      - name: Setup Export Preset
        run: |
          mkdir -p build/web
          
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          
          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/web/index.html"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false
          
          [preset.0.options]
          
          custom_template/debug=""
          custom_template/release=""
          variant/extensions_support=false
          variant/thread_support=false
          vram_texture_compression/for_desktop=true
          vram_texture_compression/for_mobile=true
          html/export_icon=true
          html/custom_html_shell=""
          html/head_include=""
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/experimental_virtual_keyboard=false
          progressive_web_app/enabled=false
          progressive_web_app/ensure_cross_origin_isolation_headers=false
          progressive_web_app/offline_page=""
          progressive_web_app/display=1
          progressive_web_app/orientation=2
          progressive_web_app/icon_144x144=""
          progressive_web_app/icon_180x180=""
          progressive_web_app/icon_512x512=""
          progressive_web_app/background_color=Color(0, 0, 0, 1)
          threads/emscripten_pool_size=4
          threads/godot_pool_size=2
          EOF
      
      - name: Build Web Version
        run: |
          ./Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --export-release "Web" build/web/index.html
      
      - name: Verify Build Output
        run: |
          echo "=== Build contents ==="
          ls -lah build/web/
          echo ""
          echo "=== File sizes ==="
          du -sh build/web/*
      
      - name: Add Mobile Optimization to Index
        run: |
          # Сохраняем оригинальный index.html от Godot
          cp build/web/index.html build/web/index.original.html
          
          # Добавляем мобильные мета-теги и стили в начало head
          sed -i '/<head>/a \
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">\
              <meta name="mobile-web-app-capable" content="yes">\
              <meta name="apple-mobile-web-app-capable" content="yes">\
              <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">\
              <style>\
                  html, body { touch-action: none; -webkit-touch-callout: none; }\
              </style>' build/web/index.html
          
          echo "=== Modified index.html preview ==="
          head -30 build/web/index.html
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 14
      
      - name: Deploy to GitHub Pages
        if: |
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/cursor/godot-web-9125') ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy_to_pages == true)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
          cname: false
      
      - name: Deploy to Netlify
        if: |
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/cursor/godot-web-9125') ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy_to_netlify == true)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './build/web'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
