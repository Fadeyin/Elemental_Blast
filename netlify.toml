# Конфигурация Netlify для Godot Web

[build]
  publish = "./"
  command = ""

# HTTP заголовки для совместимости с браузерами
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Content-Type-Options = "nosniff"

# MIME типы для WebAssembly и Godot файлов
[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.pck"
  [headers.values]
    Content-Type = "application/octet-stream"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "public, max-age=31536000, immutable"

# Редирект на index.html для SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
